<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="IA favicon">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111" />
      <stop offset="1" stop-color="#0a0a0a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>
  <!-- rounded dark square -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#g)" stroke="#1c1c1c" stroke-width="3" filter="url(#shadow)" />
  <!-- subtle inner border -->
  <rect x="10" y="10" width="108" height="108" rx="18" ry="18" fill="none" stroke="#0f0f0f" stroke-opacity="0.6" stroke-width="2" />
  <!-- IA letters -->
  <text x="64" y="72" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-family="Inter, Roboto, Arial, sans-serif" font-size="52" font-weight="700">IA</text>
</svg>